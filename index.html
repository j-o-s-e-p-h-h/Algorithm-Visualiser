<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Visualiser Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101722;
      --panel: #182230;
      --panel-edge: #30445f;
      --text: #f3f6fb;
      --muted: #b6c2d1;
      --accent: #8bc4ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background:
        radial-gradient(circle at top, rgba(139, 196, 255, 0.16), transparent 35%),
        linear-gradient(180deg, #0f1620 0%, #0b1118 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .wrap {
      width: min(960px, 100%);
      background: rgba(24, 34, 48, 0.92);
      border: 1px solid var(--panel-edge);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-family: Verdana, sans-serif;
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .video-area {
      padding: 20px;
    }

    video {
      width: 100%;
      display: block;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 20px 24px;
    }

    .button {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-family: Verdana, sans-serif;
      font-size: 0.95rem;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .button.primary {
      background: var(--accent);
      color: #07111d;
      font-weight: 700;
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Sorting Algorithm Visualizer Demo</h1>
      <p>Watch the current interface in action with the included screen recording.</p>
    </section>

    <section class="video-area">
      <video controls poster="assets/sorting-visualizer-preview.png">
        <source src="assets/sorting-visualizer-demo.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </section>

    <section class="actions">
      <a class="button primary" href="assets/sorting-visualizer-demo.mp4">Open MP4</a>
      <a class="button secondary" href="https://github.com/j-o-s-e-p-h-h/Algorithm-Visualiser">View Repository</a>
    </section>
  </main>
</body>
</html>
